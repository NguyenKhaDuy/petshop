<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="views">
    <template id="view-admin-products">
        <section class="page-heading">
            <div><span class="eyebrow">Kho hàng</span><h1>Quản lý sản phẩm</h1>
                <p>Thêm, chỉnh sửa, kiểm tra biến thể và tồn kho.</p></div>
            <button class="button button-primary" data-action="add-product"><span data-icon="plus"></span> Thêm sản phẩm</button>
        </section>
        <section class="panel data-panel">
            <div class="table-toolbar">
                <label class="search-field"><span data-icon="search"></span><input data-role="admin-product-search"
                    type="search" placeholder="Tìm sản phẩm..."></label>
                <label class="select-field"><span data-icon="layers"></span><select data-role="admin-product-category">
                    <option value="">Tất cả danh mục</option></select></label>
                <div class="toolbar-meta" data-role="admin-product-meta"></div>
            </div>
            <div class="table-wrap"><table class="data-table"><thead><tr>
                <th>Sản phẩm</th><th>Danh mục</th><th>Kho &amp; giá</th><th>Trạng thái</th><th>Cập nhật</th>
                <th class="align-right">Thao tác</th></tr></thead><tbody data-role="admin-product-table"></tbody></table></div>
            <div class="pagination" data-role="admin-product-pagination"></div>
        </section>
    </template>
</th:block>
</body>
</html>
