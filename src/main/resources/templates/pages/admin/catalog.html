<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="views">
    <template id="view-admin-categories">
        <section class="page-heading"><div><span class="eyebrow">Danh mục</span><h1>Nhóm sản phẩm</h1>
            <p>Tổ chức catalog rõ ràng và dễ khám phá.</p></div>
            <button class="button button-primary" data-action="add-category"><span data-icon="plus"></span> Thêm danh mục</button></section>
        <section class="panel data-panel">
            <div class="table-toolbar"><label class="search-field"><span data-icon="search"></span>
                <input data-role="category-search" type="search" placeholder="Tìm danh mục..."></label>
                <div class="toolbar-meta" data-role="category-meta"></div></div>
            <div class="table-wrap"><table class="data-table"><thead><tr><th>Tên danh mục</th><th>Mô tả</th>
                <th>Ngày tạo</th><th>Cập nhật</th><th class="align-right">Thao tác</th></tr></thead>
                <tbody data-role="category-table"></tbody></table></div>
        </section>
    </template>

    <template id="view-admin-sizes">
        <section class="page-heading"><div><span class="eyebrow">Thuộc tính</span><h1>Kích cỡ sản phẩm</h1>
            <p>Quản lý bộ kích cỡ dùng chung cho các biến thể.</p></div>
            <button class="button button-primary" data-action="add-size"><span data-icon="plus"></span> Thêm kích cỡ</button></section>
        <section class="size-admin-grid" data-role="size-grid"></section>
    </template>

    <template id="view-admin-vouchers">
        <section class="page-heading"><div><span class="eyebrow">Khuyến mãi</span><h1>Quản lý voucher</h1>
            <p>Tạo và theo dõi mã ưu đãi đang phát hành.</p></div>
            <button class="button button-primary" data-action="add-voucher"><span data-icon="plus"></span> Tạo voucher</button></section>
        <section class="panel data-panel">
            <div class="table-toolbar"><label class="search-field"><span data-icon="search"></span>
                <input data-role="voucher-search" type="search" placeholder="Tìm mã voucher..."></label>
                <div class="toolbar-meta" data-role="voucher-meta"></div></div>
            <div class="table-wrap"><table class="data-table"><thead><tr><th>Mã</th><th>Ưu đãi</th>
                <th>Số lượng</th><th>Hạn sử dụng</th><th>Trạng thái</th><th class="align-right">Thao tác</th></tr></thead>
                <tbody data-role="voucher-table"></tbody></table></div>
            <div class="pagination" data-role="voucher-pagination"></div>
        </section>
    </template>
</th:block>
</body>
</html>
